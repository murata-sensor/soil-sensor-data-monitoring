name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            scripts/requirements.txt
            scripts/requirements-dev.txt
      - run: pip install -r scripts/requirements.txt -r scripts/requirements-dev.txt
      - run: pytest
      - name: PII / forbidden-tokens check
        run: python -m scripts.check_no_pii

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint --if-present
        working-directory: web
      - run: npm test --if-present -- --run
        working-directory: web
      - run: npm run build
        working-directory: web
        env:
          VITE_GOOGLE_CLIENT_ID: "ci-placeholder.apps.googleusercontent.com"
          VITE_REGISTRY_SPREADSHEET_ID: "ci-placeholder"
          VITE_GAS_PROXY_URL: "https://example.invalid/exec"
          VITE_GAS_ADMIN_URL: "https://example.invalid/exec"
