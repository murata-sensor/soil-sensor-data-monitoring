name: deploy-pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
        env:
          VITE_GOOGLE_CLIENT_ID:        ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_REGISTRY_SPREADSHEET_ID: ${{ vars.VITE_REGISTRY_SPREADSHEET_ID }}
          VITE_GAS_PROXY_URL:           ${{ vars.VITE_GAS_PROXY_URL }}
          VITE_GAS_ADMIN_URL:           ${{ vars.VITE_GAS_ADMIN_URL }}
          VITE_BASE_PATH:               ${{ vars.VITE_BASE_PATH || format('/{0}/', github.event.repository.name) }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
