name: ingest-ftp

on:
  schedule:
    - cron: "30 0 * * *"   # 09:30 JST daily
  workflow_dispatch:
    inputs:
      year:
        description: "Year filter (default: current JST year)"
        required: false

permissions:
  contents: read

concurrency:
  group: ingest-ftp
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install
        run: pip install -r scripts/requirements.txt

      - name: Run ingestion
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR:  ${{ secrets.FTP_DIR }}
          # Backward-compat: ingest_ftp.py prefers FTP_SPREADSHEET_ID, falls back to SPREADSHEET_ID.
          FTP_SPREADSHEET_ID: ${{ secrets.FTP_SPREADSHEET_ID || secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_BACKUP_FOLDER_ID: ${{ secrets.DRIVE_BACKUP_FOLDER_ID }}
          INGEST_FILTER_START: ${{ secrets.INGEST_FILTER_START }}
          SITE_ID: ${{ vars.SITE_ID || 'site-a' }}
          INGEST_YEAR: ${{ inputs.year }}
        run: python -m scripts.ingest_ftp
